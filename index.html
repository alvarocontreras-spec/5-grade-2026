<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assessment A2-B1 - Secure Submission</title>
    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }

        /* Estilo para los campos de datos del alumno */
        .student-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .instruction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .box { padding: 15px; border-radius: 10px; font-size: 0.85rem; line-height: 1.4; }
        .instructions { background: #fff9db; border: 1px solid #f1c40f; }
        .vocabulary { background: #e8f8f5; border: 1px solid #2ecc71; }
        .model { background: #fdf2e9; border: 1px solid #e67e22; grid-column: span 2; color: #7f8c8d; }

        .writing-zone { position: relative; }
        textarea {
            width: 100%;
            height: 220px;
            padding: 20px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: inherit;
        }

        .word-counter {
            position: absolute;
            bottom: 15px;
            right: 15px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            background: #eee;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }

        #feedbackArea {
            margin-top: 30px;
            display: none;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #ddd;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .level-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Writing Assessment: Daily Routine</h1>
        <p>A2–B1 Official Submission</p>
    </header>

    <div id="alreadySubmittedMsg" style="display:none; color: var(--error); text-align: center; font-weight: bold; margin-bottom: 20px;">
        ⚠️ You have already submitted this task. Only one submission is allowed.
    </div>

    <div class="student-info-grid">
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="lastName" placeholder="Last Name" required>
        <input type="text" id="course" placeholder="Course/Grade" required>
    </div>

    <div class="instruction-grid">
        <div class="box instructions"><strong>📝 Rules:</strong> 40-60 words. Use Present Simple.</div>
        <div class="box vocabulary"><strong>🧱 Keywords:</strong> wake up, school, lunch, happy.</div>
        <div class="box model"><strong>🚫 Do NOT copy the alien example.</strong></div>
    </div>

    <div class="writing-zone">
        <textarea id="writingBox" placeholder="Start your routine here..."></textarea>
        <div id="counter" class="word-counter">Words: 0 / 40-60</div>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="analyzeAndSubmit()">Submit Task</button>

    <div id="feedbackArea">
        <div style="text-align: center;">
            <h2>Evaluation Ready</h2>
            <div id="levelBadgeArea"></div>
        </div>
        <div id="grammarFeedback"></div>
        <div id="vocabFeedback"></div>
    </div>
</div>

<script>
    const scriptURL = "TU_URL_DE_APPS_SCRIPT"; // REEMPLAZA CON TU URL

    // 1. Verificar si ya envió al cargar la página
    window.onload = function() {
        if (localStorage.getItem("taskSubmitted") === "true") {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('writingBox').disabled = true;
            document.getElementById('alreadySubmittedMsg').style.display = 'block';
        }
    };

    // Contador de palabras
    document.getElementById('writingBox').addEventListener('input', function() {
        const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
        document.getElementById('counter').innerText = `Words: ${words}`;
    });

    async function analyzeAndSubmit() {
        const text = document.getElementById('writingBox').value.trim();
        const fName = document.getElementById('firstName').value.trim();
        const lName = document.getElementById('lastName').value.trim();
        const course = document.getElementById('course').value.trim();

        if (!fName || !lName || !course || !text) {
            return alert("Please fill in all fields.");
        }

        const words = text.split(/\s+/).filter(w => w.length > 0);
        if (words.length < 15) return alert("Text too short.");

        // Mostrar Feedback rápido (Simulado para brevedad)
        document.getElementById('feedbackArea').style.display = 'block';
        document.getElementById('levelBadgeArea').innerHTML = `<div class="level-badge" style="background-color: var(--primary)">Processing...</div>`;

        // ENVÍO A DRIVE
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Saving Submission...";
        btn.disabled = true;

        const payload = {
            firstName: fName,
            lastName: lName,
            course: course,
            text: text,
            level: "Calculated Level" // Aquí puedes integrar tu función getLevel()
        };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' }
            });
            
            // MARCAR COMO ENVIADO EN EL NAVEGADOR
            localStorage.setItem("taskSubmitted", "true");
            alert("✅ Successfully saved! You cannot submit again.");
            location.reload(); // Recargar para bloquear todo

        } catch (error) {
            alert("❌ Error connecting to Drive.");
            btn.disabled = false;
            btn.innerText = "Submit Task";
        }
    }
</script>
</body>
</html>
